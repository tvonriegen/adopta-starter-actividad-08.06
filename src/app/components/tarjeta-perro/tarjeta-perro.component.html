<!-- TODO: arma la tarjeta del perro.
     Tienes todos sus datos en `perro`: nombre, raza, edad, foto, adoptado…

     Varios caminos llevan a Roma: una opción es un ion-card con la foto y un
     badge de estado (Adoptado / Disponible), pero puedes hacerlo a tu manera.

     ¿Necesitas una referencia? Mira la galería de adopta-app. -->
<ion-card>
  <img [src]="perro.foto" [alt]="perro.nombre" />

  <ion-card-header>
    <ion-card-title>{{ perro.nombre }}</ion-card-title>
    <ion-card-subtitle>
      {{ perro.raza }} · {{ perro.edad }}
    </ion-card-subtitle>
  </ion-card-header>

  <ion-card-content>
    <p>{{ perro.descripcion }}</p>

    <ion-chip [color]="perro.adoptado ? 'success' : 'warning'">
      {{ perro.adoptado ? 'Adoptado' : 'Disponible' }}
    </ion-chip>
  </ion-card-content>
</ion-card>
